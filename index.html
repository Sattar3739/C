<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OLD-STUDIO | WhatsApp Bot Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #8f5eff;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: #334155;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: 800;
            color: var(--primary) !important;
            font-size: 1.5rem;
        }

        .stats-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .post-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            font-weight: 700;
            border-radius: 10px;
            padding: 10px 20px;
        }

        .btn-danger {
            background: #ef4444;
            border: none;
            border-radius: 10px;
        }

        .console-body {
            background: #000;
            border-radius: 10px;
            height: 250px;
            overflow-y: auto;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            color: #10b981;
        }

        .hidden {
            display: none !important;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
        }

        .connected {
            background: #10b981;
        }

        .disconnected {
            background: #ef4444;
        }

        .progress-container {
            width: 100%;
            background-color: var(--border);
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .progress-bar {
            width: 0%;
            height: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .loading-text {
            font-size: 12px;
            color: var(--muted);
            margin-top: 5px;
            text-align: center;
        }

        .pair-code-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 10px;
            word-break: break-word;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="fas fa-robot me-2"></i>OLD-STUDIO BOT
        </a>
    </div>
</nav>

<div class="container mt-4">

    <div class="stats-card">
        <h3 id="totalActive">0</h3>
        <p class="mb-0">TOTAL BOT ACTIVE</p>
    </div>

    <!-- SETUP SECTION -->
    <div id="setupSection">
        <div class="post-card">

            <h5 class="mb-3">
                <i class="fas fa-plus-circle me-2"></i>CREATE BOT
            </h5>

            <div class="input-group mb-3">
                <input
                    type="text"
                    id="userIdInput"
                    class="form-control"
                    placeholder="Enter Unique Bot Name"
                />

                <button class="btn btn-primary" onclick="selectUser()">
                    CREATE / SELECT
                </button>
            </div>

            <div id="connectionLoader" class="text-center hidden">
                <div class="spinner-border text-primary"></div>
                <p class="mt-2 text-muted">
                    Connecting to server...
                </p>
            </div>

        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="userDashboard" class="hidden">

        <!-- STAGE 1 -->
        <div id="stage1">

            <div class="post-card">

                <h5>
                    <i class="fas fa-link me-2"></i>PAIRING CODE
                </h5>

                <div class="mb-3">
                    <label class="form-label">
                        WhatsApp Number (with country code)
                    </label>

                    <input
                        type="tel"
                        class="form-control"
                        id="pairNumber"
                        placeholder="923001234567"
                    />
                </div>

                <button class="btn btn-primary w-100" id="pairBtn">
                    GENERATE CODE
                </button>

                <div id="progressContainer" class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>

                    <div class="loading-text">
                        ⏳ Connecting to WhatsApp... Please wait.
                    </div>
                </div>

                <div
                    id="pairingResult"
                    class="mt-3 text-center h4 text-warning pair-code-box"
                ></div>

            </div>
        </div>

        <!-- STAGE 2 -->
        <div id="stage2" class="hidden">

            <div class="post-card d-flex justify-content-between align-items-center">

                <div>
                    <span
                        id="connectionStatus"
                        class="status-badge disconnected"
                    >
                        DISCONNECTED
                    </span>

                    <span class="ms-2" id="activeBotName"></span>
                </div>

                <button class="btn btn-danger btn-sm" id="logoutBtn">
                    LOGOUT
                </button>

            </div>

            <div class="post-card">

                <h5>
                    <i class="fas fa-terminal me-2"></i>LIVE CONSOLE
                </h5>

                <div class="console-body" id="console"></div>

            </div>

        </div>

    </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>

    // AUTO SERVER URL
    const SERVER_URL = window.location.origin;

    const socket = io(SERVER_URL, {
        transports: ['websocket', 'polling'],
        reconnection: true,
        reconnectionAttempts: 10,
        reconnectionDelay: 1000
    });

    let currentUserId = null;

    // SOCKET CONNECT
    socket.on('connect', () => {
        console.log('Connected to server');
    });

    // RECONNECT
    socket.io.on('reconnect', () => {
        console.log('Reconnected to server');
    });

    // CONNECTION ERROR
    socket.on('connect_error', (err) => {
        console.error('Connection Error:', err);
        alert('Server connection failed');
    });

    // SELECT USER
    function selectUser() {

        const userId = document.getElementById('userIdInput').value.trim();

        if (!userId) {
            return alert('Enter bot name');
        }

        if (!socket.connected) {
            return alert('Not connected to server');
        }

        currentUserId = userId;

        document
            .getElementById('connectionLoader')
            .classList.remove('hidden');

        socket.emit('set-user', userId);

        document.getElementById('activeBotName').innerText =
            "Bot: " + userId;

        document
            .getElementById('setupSection')
            .classList.add('hidden');

        document
            .getElementById('userDashboard')
            .classList.remove('hidden');

        document
            .getElementById('stage1')
            .classList.remove('hidden');

        document
            .getElementById('stage2')
            .classList.add('hidden');
    }

    // TOTAL ACTIVE
    socket.on('total-active', (count) => {
        document.getElementById('totalActive').innerText = count;
    });

    // PAIRING CODE
    socket.on('pairing-code', (code) => {

        document.getElementById('progressContainer').style.display = 'none';

        document.getElementById('progressBar').style.width = '100%';

        document.getElementById('pairingResult').innerText =
            "YOUR CODE: " + code;
    });

    // LIVE CONSOLE
    socket.on('console', (log) => {

        const consoleDiv = document.getElementById('console');

        const entry = document.createElement('div');

        // SAFE TEXT
        entry.textContent = `[${log.timestamp}] ${log.message}`;

        consoleDiv.appendChild(entry);

        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    });

    // CONNECTION STATUS
    socket.on('connection-status', (status) => {

        const badge = document.getElementById('connectionStatus');

        document
            .getElementById('connectionLoader')
            .classList.add('hidden');

        if (status.connected) {

            badge.className = 'status-badge connected';

            badge.innerText = 'CONNECTED';

            document
                .getElementById('stage1')
                .classList.add('hidden');

            document
                .getElementById('stage2')
                .classList.remove('hidden');

            document.getElementById('progressContainer').style.display =
                'none';

        } else {

            badge.className = 'status-badge disconnected';

            badge.innerText = 'DISCONNECTED';
        }
    });

    // GENERATE PAIR CODE
    document.getElementById('pairBtn').onclick = () => {

        const number =
            document.getElementById('pairNumber').value.trim();

        // EMPTY CHECK
        if (!number) {
            return alert('Enter WhatsApp number');
        }

        // NUMBER VALIDATION
        if (!/^\d{10,15}$/.test(number)) {
            return alert('Enter valid WhatsApp number');
        }

        const progressContainer =
            document.getElementById('progressContainer');

        const progressBar =
            document.getElementById('progressBar');

        const pairingResult =
            document.getElementById('pairingResult');

        pairingResult.innerText = "";

        progressContainer.style.display = 'block';

        progressBar.style.width = '0%';

        let width = 0;

        const interval = setInterval(() => {

            if (width >= 90) {

                clearInterval(interval);

            } else {

                width += 2;

                progressBar.style.width = width + '%';
            }

        }, 100);

        socket.emit('pair-request', {
            userId: currentUserId,
            number
        });
    };

    // LOGOUT
    document.getElementById('logoutBtn').onclick = () => {

        socket.emit('logout', currentUserId);

        location.reload();
    };

</script>

</body>
</html>
